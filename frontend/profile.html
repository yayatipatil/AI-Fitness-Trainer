<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Fitness Trainer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">FitAI.</a>
        <div class="links">
            <a href="dashboard.html">Dashboard</a>
            <a href="planner.html">Weekly Plan</a>
            <a href="workouts.html">Workouts</a>
            <a href="diet.html">Diet</a>
            <a href="analytics.html">Analytics</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="live_coach.html" class="btn btn-accent" style="padding: 0.5rem 1rem;">
                <i data-lucide="video" style="width:16px;height:16px;"></i> Live Coach
            </a>
            <a href="#" onclick="logout()" style="margin-left:1rem;">Logout</a>
        </div>
    </nav>

    <div class="container" id="profile-setup">
        <div class="glass-panel" style="max-width: 600px; margin: 0 auto; padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i data-lucide="user-circle" style="width: 64px; height: 64px; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2 class="gradient-text">Your Profile</h2>
                <p>Tell us about yourself to get personalized AI recommendations.</p>
            </div>
            
            <form id="profile-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="p-age" required placeholder="e.g. 25">
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="p-gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" step="0.1" id="p-height" required placeholder="175">
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" id="p-weight" required placeholder="70">
                    </div>
                </div>

                <div class="form-group">
                    <label>Primary Goal</label>
                    <select id="p-goal" required>
                        <option value="Weight Loss">Weight Loss</option>
                        <option value="Muscle Gain">Muscle Gain</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Experience Level</label>
                    <select id="p-experience" required>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                
                <button type="submit" class="btn" style="margin-top: 1rem;">
                    <i data-lucide="save" style="width:18px;height:18px;"></i> Save Profile
                </button>
            </form>
        </div>
        
        <div class="glass-panel" style="max-width: 600px; margin: 2rem auto; padding: 3rem; position: relative;">
            <div id="toast" style="display: none; position: absolute; top: 10px; right: 20px; background: var(--accent); color: white; padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">Saved!</div>
            <div style="margin-bottom: 1.5rem;">
                <h3 class="gradient-text"><i data-lucide="dumbbell" style="vertical-align: middle;"></i> My Equipment</h3>
                <p>Select what you have available. Your workouts will adapt automatically.</p>
            </div>
            <div id="equipment-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <!-- Filled via JS -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        
        async function loadProfileData() {
            try {
                const profile = await apiCall('/auth/me');
                document.getElementById('p-age').value = profile.age;
                document.getElementById('p-height').value = profile.height;
                document.getElementById('p-weight').value = profile.weight;
                document.getElementById('p-gender').value = profile.gender;
                document.getElementById('p-goal').value = profile.goal;
                document.getElementById('p-experience').value = profile.experience_level;
            } catch (err) {
                console.log("No profile found, please fill out the form.");
            }
        }

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                age: parseInt(document.getElementById('p-age').value),
                height: parseFloat(document.getElementById('p-height').value),
                weight: parseFloat(document.getElementById('p-weight').value),
                gender: document.getElementById('p-gender').value,
                goal: document.getElementById('p-goal').value,
                experience_level: document.getElementById('p-experience').value
            };
            
            try {
                // Notice the backend schema for User is flat, so mapping to exact DB keys:
                await apiCall('/auth/me', 'POST', {
                    age: parseInt(document.getElementById('p-age').value),
                    height_cm: parseFloat(document.getElementById('p-height').value),
                    weight_kg: parseFloat(document.getElementById('p-weight').value),
                    gender: document.getElementById('p-gender').value,
                    fitness_goal: document.getElementById('p-goal').value,
                    experience_level: document.getElementById('p-experience').value
                });
                showToast('Profile saved successfully!');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (err) {
                showToast('Error saving profile: ' + err.message, 'error');
            }
        });

        // Equipment Logic
        const ALL_EQUIPMENT = ["bodyweight", "resistance bands", "dumbbells", "barbell", "bench", "pull-up bar", "cable machine", "kettlebell", "full gym"];
        let userEqSet = new Set();
        let eqTimeout = null;
        
        async function loadEquipment() {
            try {
                const data = await apiCall('/user/equipment');
                userEqSet = new Set(data.equipment || []);
                renderEquipmentList();
            } catch(e) { console.error(e); }
        }
        
        function renderEquipmentList() {
            const container = document.getElementById('equipment-list');
            container.innerHTML = ALL_EQUIPMENT.map(eq => `
                <label style="display: flex; align-items: center; gap: 8px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer;">
                    <input type="checkbox" value="${eq}" ${userEqSet.has(eq) ? 'checked' : ''} onchange="toggleEquipment('${eq}', this.checked)" style="width: 18px; height: 18px; accent-color: var(--accent);">
                    <span style="text-transform: capitalize; color: var(--text-main); font-size: 0.95rem;">${eq}</span>
                </label>
            `).join('');
        }
        
        function toggleEquipment(eq, isChecked) {
            if(isChecked) userEqSet.add(eq);
            else userEqSet.delete(eq);
            
            // Autosave with debounce
            if(eqTimeout) clearTimeout(eqTimeout);
            eqTimeout = setTimeout(async () => {
                try {
                    await apiCall('/user/equipment', 'PUT', { equipment: Array.from(userEqSet) });
                    const toast = document.getElementById('toast');
                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 2000);
                } catch(e) { console.error(e); }
            }, 500);
        }

        if (getToken()) {
            loadProfileData();
            loadEquipment();
        }
    </script>
</body>
</html>
