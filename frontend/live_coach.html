<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live AI Coach - AI Fitness Trainer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- MediaPipe Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: #000;
            border: 2px solid rgba(59, 130, 246, 0.3);
        }
        
        .video-container video, .video-container canvas {
            width: 100%;
            display: block;
        }
        
        .video-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        
        .hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 20;
            background: rgba(13, 22, 39, 0.8);
            padding: 20px 30px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: white;
            min-width: 250px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .hud-value {
            font-size: 4rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            margin: 5px 0;
        }
        
        .hud-label {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .feedback-text {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            background: rgba(59, 130, 246, 0.9);
            padding: 15px 30px;
            border-radius: 12px;
            display: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -20px) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
        
        .controls {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">FitAI.</a>
        <div class="links">
            <a href="dashboard.html">Dashboard</a>
            <a href="planner.html">Weekly Plan</a>
            <a href="workouts.html">Workouts</a>
            <a href="diet.html">Diet</a>
            <a href="analytics.html">Analytics</a>
            <a href="profile.html">Profile</a>
            <a href="live_coach.html" class="btn btn-accent active" style="padding: 0.5rem 1rem; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);">
                <i data-lucide="video" style="width:16px;height:16px;"></i> Live Coach
            </a>
            <a href="#" onclick="logout()" style="margin-left:1rem;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel" style="text-align: center; margin-bottom: 2rem; border-color: rgba(16, 185, 129, 0.3);">
            <h2 style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;" class="gradient-text">
                <i data-lucide="scan-line" style="width: 32px; height: 32px; color: var(--accent);"></i>
                Live AI Workout Coach
            </h2>
            <p>Select your exercise, stand back so your full body is visible, and begin.</p>
            
            <div style="margin: 1.5rem 0; display: flex; align-items: center; justify-content: center; gap: 1rem;">
                <label style="font-weight: 600; color: var(--text-muted);">Exercise Mode:</label>
                <div class="form-group" style="margin-bottom: 0; width: 250px;">
                    <select id="exercise-type">
                        <option value="squat">Squats</option>
                        <option value="lunge">Lunges</option>
                        <option value="plank">Plank</option>
                        <option value="shoulder_press">Shoulder Press</option>
                        <option value="pushup">Push-ups</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="video-container">
            <video id="input_video" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div class="feedback-text" id="feedback">Good!</div>
            
            <div class="hud">
                <div class="hud-label">Reps Completed</div>
                <div class="hud-value" id="rep-count">0</div>
                <div style="margin-top: 15px; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem;" id="status-text">
                    <i data-lucide="loader" class="spin-icon" style="width: 16px; height: 16px;"></i> Waiting for camera...
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-start" class="btn btn-primary" onclick="startCamera()" style="width: 250px;">
                <i data-lucide="camera" style="width:20px;height:20px;"></i> Start Camera
            </button>
            <button id="btn-finish" class="btn btn-accent" onclick="finishWorkout()" style="display: none; width: 250px;">
                <i data-lucide="check-circle" style="width:20px;height:20px;"></i> Finish & Log Workout
            </button>
        </div>
    </div>

    <!-- Load main script first for API calls, then pose tracker -->
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
    <script src="pose_tracker.js"></script>
</body>
</html>
