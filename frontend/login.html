<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Fitness Trainer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">FitAI.</a>
        <div class="links">
            <a href="register.html" class="btn btn-accent" style="padding: 0.5rem 1rem;">Sign Up</a>
        </div>
    </nav>
    <div class="container center-box">
        <div class="glass-panel auth-form" style="padding: 3rem 2rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i data-lucide="log-in" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1rem;"></i>
                <h2 class="gradient-text">Welcome Back</h2>
                <p>Login to track your fitness journey.</p>
            </div>
            <div id="error-msg" class="error-msg hidden"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Login</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            
            try {
                const params = new URLSearchParams();
                params.append('username', username);
                params.append('password', password);
                
                const data = await apiCall('/login', 'POST', params);
                setToken(data.access_token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
